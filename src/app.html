<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Upload your CV and get instant AI-powered analysis with match scores, persona insights, rewrites, ATS tips, and suggested roles." />
  <title>AI CV Optimizer — AI-Powered Resume Analysis</title>
  <link rel="icon" href="%sveltekit.assets%/logo.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="%sveltekit.assets%/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    (function () {
      /* Default to dark for the electric lightning experience */
      const saved = localStorage.getItem('theme');
      const t = saved || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  %sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
